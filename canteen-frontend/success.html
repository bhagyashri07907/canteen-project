<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen - Order Success</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Dynamic Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main-content container mt-5 pt-4 text-center animate-fade-in">
        <div class="glass-panel p-5 mx-auto" style="max-width: 600px;">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
            </div>
            <h1 class="fw-bold mb-3">Order Placed Successfully!</h1>
            <p class="text-muted fs-5 mb-4">Your order has been received and is being prepared.</p>
            
            <div class="bg-light p-3 rounded mb-4 d-inline-block text-dark">
                <span class="text-muted small">Order ID:</span>
                <span class="fw-bold fs-5 ms-2" id="orderIdDisplay">ORD-XXXXXX</span>
            </div>
            
            <div class="d-flex gap-3 justify-content-center">
                <a href="track.html" class="btn btn-primary rounded-pill px-4">Track Order</a>
                <a href="menu.html" class="btn btn-outline-secondary rounded-pill px-4">Back to Menu</a>
            </div>
        </div>
    </main>

    <!-- Dynamic Footer -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const orderId = localStorage.getItem("canteen_last_order") || "ORD-" + Math.floor(Math.random() * 1000000);
            document.getElementById("orderIdDisplay").textContent = orderId;
        });
    </script>
</body>
</html>
