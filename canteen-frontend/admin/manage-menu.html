<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar d-none d-md-block">
                <div class="text-center mb-4 px-3">
                    <h4 class="text-white fw-bold"><i class="bi bi-shop me-2"></i>Admin</h4>
                </div>
                <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a href="manage-menu.html" class="active"><i class="bi bi-journal-text me-2"></i> Manage Menu</a>
                <a href="#"><i class="bi bi-box-seam me-2"></i> Orders</a>
                <a href="#"><i class="bi bi-people me-2"></i> Users</a>
                <a href="../index.html" class="mt-5 text-white-50"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-10 bg-light" style="min-height: 100vh;">
                <!-- Top Navbar -->
                <nav class="navbar navbar-light bg-white border-bottom px-4 py-3 mb-4">
                    <h5 class="mb-0 fw-bold">Manage Menu</h5>
                    <div class="d-flex align-items-center">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=FF4500&color=fff" class="rounded-circle" width="40">
                    </div>
                </nav>
                
                <div class="px-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="input-group" style="max-width: 300px;">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control border-start-0" placeholder="Search menu...">
                        </div>
                        <button class="btn btn-primary fw-bold"><i class="bi bi-plus-lg me-1"></i> Add Item</button>
                    </div>
                    
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Image</th>
                                            <th>Item Name</th>
                                            <th>Category</th>
                                            <th>Price</th>
                                            <th>Status</th>
                                            <th class="text-end">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr id="menuRow-1">
                                            <td>
                                                <div class="bg-secondary bg-opacity-10 rounded d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                                    <i class="bi bi-image text-muted"></i>
                                                </div>
                                            </td>
                                            <td class="fw-bold">Classic Burger</td>
                                            <td>Snacks</td>
                                            <td>₹80</td>
                                            <td>
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" type="checkbox" checked>
                                                    <label class="form-check-label">Available</label>
                                                </div>
                                            </td>
                                            <td class="text-end">
                                                <button class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></button>
                                                <button class="btn btn-sm btn-outline-danger" onclick="deleteMenu(1)"><i class="bi bi-trash"></i></button>
                                            </td>
                                        </tr>
                                        <tr id="menuRow-2">
                                            <td>
                                                <div class="bg-secondary bg-opacity-10 rounded d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                                    <i class="bi bi-image text-muted"></i>
                                                </div>
                                            </td>
                                            <td class="fw-bold">Veggie Pizza</td>
                                            <td>Snacks</td>
                                            <td>₹150</td>
                                            <td>
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" type="checkbox" checked>
                                                    <label class="form-check-label">Available</label>
                                                </div>
                                            </td>
                                            <td class="text-end">
                                                <button class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></button>
                                                <button class="btn btn-sm btn-outline-danger" onclick="deleteMenu(2)"><i class="bi bi-trash"></i></button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
