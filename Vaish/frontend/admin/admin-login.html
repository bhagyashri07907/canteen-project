<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Canteen</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background: var(--secondary-color);">

    <div class="glass-panel p-5 animate-fade-in" style="width: 100%; max-width: 400px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock text-white fs-1"></i>
            <h2 class="text-white fw-bold mt-2">Admin Portal</h2>
        </div>
        
        <form onsubmit="return handleAdminLogin(event)">
            <div class="mb-3">
                <label class="form-label text-white-50">Username</label>
                <input type="text" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-white-50">Password</label>
                <input type="password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
            
            <div class="text-center mt-3">
                <a href="../index.html" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Main Site</a>
            </div>
        </form>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
