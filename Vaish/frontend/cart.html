<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen - Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .cart-item {
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .qty-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .qty-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .qty-input {
            width: 40px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Dynamic Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main-content container mt-4 animate-fade-in">
        <h2 class="fw-bold mb-4">Your Cart</h2>
        
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="glass-panel p-4" id="cartContainer">
                    <!-- Cart items injected by JS -->
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="glass-panel p-4 sticky-top" style="top: 100px;">
                    <h4 class="fw-bold mb-4">Order Summary</h4>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal</span>
                        <span class="fw-bold" id="cartSubtotal">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Tax (5%)</span>
                        <span class="fw-bold" id="cartTax">₹0</span>
                    </div>
                    <hr class="border-secondary opacity-25">
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold fs-5">Total</span>
                        <span class="fw-bold fs-5" style="color: var(--primary-color);" id="cartTotal">₹0</span>
                    </div>
                    
                    <a href="checkout.html" id="checkoutBtn" class="btn btn-primary w-100 rounded-pill py-2 fs-5">Proceed to Checkout</a>
                    <a href="menu.html" class="btn btn-outline-secondary w-100 rounded-pill py-2 mt-2">Continue Shopping</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Dynamic Footer -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
