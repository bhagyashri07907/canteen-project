<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Canteen</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .star-rating {
            font-size: 1.5rem;
            color: #ccc;
            cursor: pointer;
        }
        .star-rating .bi-star-fill.active {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <!-- Dynamic Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main-content container mt-4 animate-fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">My Order History</h2>
            <button class="btn btn-outline-primary rounded-pill" onclick="fetchHistory()">
                <i class="bi bi-arrow-clockwise me-2"></i> Refresh
            </button>
        </div>
        
        <div id="history-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 text-muted">Fetching your orders...</p>
            </div>
        </div>
    </main>

    <!-- Dynamic Footer -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchHistory();
        });

        async function fetchHistory() {
            const username = localStorage.getItem("canteen_user");
            const container = document.getElementById("history-container");
            
            if (!username) {
                container.innerHTML = `
                    <div class="glass-panel p-5 text-center">
                        <i class="bi bi-person-lock fs-1 text-muted mb-3"></i>
                        <h4>Please log in to see your history</h4>
                        <a href="login.html" class="btn btn-primary mt-3 px-4 rounded-pill">Login Now</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`http://localhost:5000/my-orders/${username}`);
                const data = await response.json();
                
                if (data.orders && data.orders.length > 0) {
                    renderHistory(data.orders);
                } else {
                    container.innerHTML = `
                        <div class="glass-panel p-5 text-center">
                            <i class="bi bi-cart-x fs-1 text-muted mb-3"></i>
                            <h4>No orders found</h4>
                            <p class="text-muted">Hungry? Order something delicious from the menu!</p>
                            <a href="menu.html" class="btn btn-primary mt-3 px-4 rounded-pill">View Menu</a>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Failed to fetch history:", err);
                container.innerHTML = `<div class="alert alert-danger">Error connecting to server. Please try again later.</div>`;
            }
        }

        function renderHistory(orders) {
            const container = document.getElementById("history-container");
            let html = "";
            
            orders.forEach(order => {
                const date = new Date(order.date).toLocaleDateString([], { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                const itemsStr = order.items.map(i => `${i.quantity}x ${i.name}`).join(", ");
                
                let badgeClass = "bg-warning text-dark";
                if (order.status === "Ready for Pickup") badgeClass = "bg-info text-dark";
                if (order.status === "Delivered" || order.status === "Completed") badgeClass = "bg-success";

                let ratingHtml = "";
                if ((order.status === "Delivered" || order.status === "Completed") && !order.rating) {
                    ratingHtml = `
                        <div class="mt-3 pt-3 border-top">
                            <span class="small text-muted me-2">Rate your experience:</span>
                            <span class="star-rating" data-order-id="${order._id}">
                                <i class="bi bi-star-fill" data-value="1" onclick="submitRating('${order._id}', 1)"></i>
                                <i class="bi bi-star-fill" data-value="2" onclick="submitRating('${order._id}', 2)"></i>
                                <i class="bi bi-star-fill" data-value="3" onclick="submitRating('${order._id}', 3)"></i>
                                <i class="bi bi-star-fill" data-value="4" onclick="submitRating('${order._id}', 4)"></i>
                                <i class="bi bi-star-fill" data-value="5" onclick="submitRating('${order._id}', 5)"></i>
                            </span>
                        </div>
                    `;
                } else if (order.rating) {
                    ratingHtml = `
                        <div class="mt-2 text-muted small">
                            Your Rating: ${Array(order.rating).fill('<i class="bi bi-star-fill text-warning"></i>').join('')}
                        </div>
                    `;
                }

                html += `
                    <div class="glass-panel p-4 mb-3 animate-fade-in">
                        <div class="row g-3 align-items-center">
                            <div class="col-6 col-md-2">
                                <span class="small text-muted d-block">Order ID</span>
                                <span class="fw-bold text-primary">#${order._id.substring(order._id.length - 6).toUpperCase()}</span>
                            </div>
                            <div class="col-6 col-md-2 order-md-4 text-md-end">
                                <span class="small text-muted d-block">Status</span>
                                <span class="badge ${badgeClass}">${order.status}</span>
                            </div>
                            <div class="col-12 col-md-4">
                                <span class="small text-muted d-block">Items</span>
                                <span class="fw-bold text-truncate d-block">${itemsStr}</span>
                            </div>
                            <div class="col-6 col-md-2">
                                <span class="small text-muted d-block">Date</span>
                                <span class="small">${date}</span>
                            </div>
                            <div class="col-6 col-md-2 text-end">
                                <h5 class="fw-bold mb-0">₹${order.total}</h5>
                                <a href="track.html?id=${order._id}" class="btn btn-link btn-sm p-0 text-decoration-none" onclick="localStorage.setItem('canteen_last_order', '${order._id}')">Track <i class="bi bi-arrow-right"></i></a>
                            </div>
                        </div>
                        ${ratingHtml}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        async function submitRating(orderId, rating) {
            try {
                const response = await fetch("http://localhost:5000/rate-order", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ orderId, rating })
                });
                if (response.ok) {
                    fetchHistory(); // Refresh to show the stars
                }
            } catch (err) {
                console.error("Failed to submit rating:", err);
            }
        }
    </script>
</body>
</html>
