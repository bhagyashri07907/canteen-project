<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 5rem auto;
        }
        .form-control {
            background-color: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }
        .form-control:focus {
            background-color: var(--glass-bg);
            color: var(--text-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 69, 0, 0.25);
        }
    </style>
</head>
<body>

    <!-- Dynamic Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main-content container animate-fade-in">
        <div class="auth-container glass-panel p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-circle fs-1 text-primary"></i>
                <h2 class="fw-bold mt-2">Welcome Back</h2>
                <p class="text-muted">Login to continue ordering</p>
            </div>
            
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label text-muted">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Enter your username">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                </div>
                
                <div id="loginMsg" class="alert alert-danger d-none mb-3" role="alert"></div>
                
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fs-5 shadow-sm mb-3">Login</button>
                
                <div class="text-center mt-3">
                    <span class="text-muted">Don't have an account?</span>
                    <a href="register.html" class="text-primary text-decoration-none fw-bold ms-1">Register</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Dynamic Footer -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const msgEl = document.getElementById("loginMsg");
            
            try {
                const response = await fetch("http://localhost:5000/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Login successful
                    localStorage.setItem("canteen_user", user);
                    msgEl.classList.add("d-none");
                    window.location.href = "index.html";
                } else {
                    msgEl.textContent = data.message || "Invalid Credentials";
                    msgEl.classList.remove("d-none");
                }
            } catch (err) {
                msgEl.textContent = "Server error. Please try again later.";
                msgEl.classList.remove("d-none");
            }
        }
    </script>
</body>
</html>
